<html>
<head> 
	<title>CSS|FORMATTING TAGS</title>
</head>
    <style>
        #p1
        {
          color:red;
          background-color:lightpink;
          text-transform:capitalize;
          
          height: 60px;
          width: 70px;
          border: 1px solid red;
          margin-left: 10px;
          
          padding: 5px;
        }
        
        #p2
        {
          color:blue;
          background-color:lightblue;
          text-transform:uppercase;
          height: 40px;
          width: 95px;
          border: 1px solid blue;
          margin-left: 10px;
          
          padding: 5px;
        }
        
        #p3
        {
          color:green;
          background-color:lightgreen;
          font-variant:small-caps;
          
          height: 60px;
          width: 90px;
          border: 1px solid green;
          margin-left: 10px;
          
          padding: 5px;
        }
    </style>
<body>
	<h3>PROGRAMMING LANGUAGES</h3>
		<p id="p1"> C is a Procedural Language. </p>
		<p id="p2"> Java is PI language. </p>
		<p id="p3"> Python is Easy to Understand. </p>
</body>	
</html>
